<div class="bg-wrapper" aria-hidden="true">
  <video
    class="bg-video"
    src="/video/bg-quill-fantasy-25.mp4"
    autoplay
    muted
    loop
    playsinline
  ></video>
</div>
<div class="login-container">
  <mat-card>
    <mat-card-content>
      <div style="text-align: center;">
        <app-quilly-character
          sequence="idle"
          [size]="150"
          [speech]="speech()"
          [speechDuration]="speechMs"
          speechPosition="above"
          ariaLabel="Quilly, the Quill AI mascot"
        />
        <p>Please sign in with your Google account to access the app.</p>
      </div>
      <div #googleBtn class="google-btn-wrapper"></div>
    </mat-card-content>
  </mat-card>
</div>
