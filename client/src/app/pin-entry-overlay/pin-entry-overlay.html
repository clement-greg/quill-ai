<div class="pin-overlay">
  <div class="pin-card">
    <mat-icon class="lock-icon">lock</mat-icon>
    <h3 class="pin-title">Photos Locked</h3>
    <p class="pin-desc">Enter your PIN to continue.</p>

    <!-- Dot display — tap to bring up keyboard -->
    <div class="pin-dots-wrap" (click)="focusInput()">
      @if (pinDisplay().length === 0) {
        <span class="pin-dots-placeholder">Tap to enter PIN</span>
      } @else {
        @for (filled of pinDisplay(); track $index) {
          <span class="pin-dot filled"></span>
        }
      }
    </div>

    <!--
      Hidden capture input.
      type="tel" — numeric keyboard on mobile, NOT detected as a password field.
      autocomplete="off" + name with no password-related word.
      Visually hidden but focusable so the OS keyboard opens.
    -->
    <input
      #pinCapture
      class="pin-capture"
      type="tel"
      autocomplete="off"
      name="unlock-code"
      inputmode="numeric"
      [value]="pinValue()"
      (input)="onInput($event)"
      (keydown.enter)="submit()"
      aria-label="PIN"
    />

    @if (error()) {
      <p class="pin-error">
        <mat-icon>error_outline</mat-icon>
        Incorrect PIN. Please try again.
      </p>
    }

    <button
      mat-flat-button
      class="pin-submit-btn"
      (click)="submit()"
      [disabled]="!pinValue().trim() || checking()"
    >
      <mat-icon>lock_open</mat-icon>
      Unlock
    </button>
  </div>
</div>
