@if (!isUnthemed()) {
<mat-toolbar color="primary" class="app-toolbar">

  <!-- Back button (shown on all pages deeper than /series) -->
  @if (hasBackNav()) {
    <button mat-icon-button class="back-btn" (click)="goBack()" aria-label="Go back">
      <mat-icon>arrow_back</mat-icon>
    </button>
  }

  <!-- Logo -->
  <a routerLink="/series" class="toolbar-brand">
    <img [src]="logoSrc()" style="height: 36px;">
  </a>

  <!-- Desktop breadcrumbs -->
  <div class="breadcrumbs-container">
    @for (crumb of header.breadcrumbs(); track crumb.label) {
      <mat-icon class="breadcrumb-sep">chevron_right</mat-icon>
      <app-breadcrumb-dropdown [crumb]="crumb" />
    }
  </div>

  <span class="toolbar-spacer"></span>

  @if (auth.currentUser()) {
    <!-- Single hamburger that opens the Application Explorer -->
    <button mat-icon-button (click)="explorer.toggle()" title="Menu" aria-label="Open menu">
      <mat-icon>menu</mat-icon>
    </button>
  }

</mat-toolbar>
}

<main [class.full-height]="isUnthemed()" [class.resource-manager-open]="aiAssistant.isOpen()" [class.resizing]="isResizing()">
  <router-outlet />
</main>

@if (aiAssistant.isOpen()) {
  <div class="panel-resizer" (pointerdown)="onResizerPointerDown($event)"></div>
}

@if (auth.currentUser()) {
  <app-ai-assistant />
  <app-app-explorer />
  <app-quick-chat />
}

@if (updateCheck.updateAvailable()) {
  <div class="update-banner">
    <mat-icon>system_update_alt</mat-icon>
    <span>A new version is available.</span>
    <button mat-flat-button (click)="reload()">Refresh</button>
  </div>
}
